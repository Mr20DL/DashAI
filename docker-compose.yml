version: '3.8'

services:
  db:
    image: postgres:15
    container_name: dashai_postgres
    restart: always
    environment:
      POSTGRES_USER: carlos
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: dashai_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
